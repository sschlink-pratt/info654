<!DOCTYPE html>
<html>
    <!-- This is an HTML comment. -->
    <!-- It's doesn't affect the webpage, it's just for coders like us to read --> 
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Sam Schlinkert">
        <!-- This meta tag does an OK job make this page more adaptive to smaller devices like smartphones -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- This title tag's content appears in the user's browser tab! -->
        <title>Dogs -- Week7 index</title>

        <!-- Let's write some CSS inside of this HTML head -->
        <!-- We do this by using the <style> tag -->
        <style>
            /* Now that we're inside a <style> tag, we're writing CSS */
            /* Comments in CSS have a slightly different syntax. I always liked them best, since they remind me of dandelions. */

            /* First, we'll add some styles to all <h1> and <h2> tags */
            h1 { 
                color: blue; /* font color is blue */
                text-align: center; /* and text will be centered */ 
                text-decoration: underline; /* and underlined */
            }
            h2 {
                color: green;
                /* When specifying fonts in CSS, it's good practice list multiple fonts in case the user's system doesn't have our first choice */
                font-family: Helvetica, Arial, sans-serif; /* Love you, Helvety https://www.youtube.com/watch?v=X80kSDxF4rg */

                /* We'll also make the font weight a bit lighter than the default */
                font-weight: lighter; 
            }
            /* In HTML5 speak, <strong> is bold. So <strong>this would be in bold</strong> 
            We'll make some changes to this default styling though, just for fun */
            strong {
                font-weight: 900; /* We'll make it extra heavy/bold */ 
                text-transform: uppercase; /* And force it to be uppercase */
            }
            /* Next, we'll make some changes to all images in our file */
            img {
                border-radius: 15%; /* add rounded edges */ 
            }
            /* Next, we'll change how links are styled based on whether they've been visited, user is hovering over them, or they're being actively clicked. */
            a:link {}
            a:visited { color: pink } /* if the user has been to the link's destination recently, make it pink */
            a:hover { 
                background-color: blue; 
                color:white; 
                text-transform:uppercase; 
            }
            a:active {color:brown}

            /* Give lines in paragraphs a bit of room to breath */
            p {
                line-height: 1.4;
            }
            /* For SOME images, namely those of dogs, we want to add a big flashy border. But not to all images! To do this, we'll define a CSS class called dog, which we do using a period. */
            .dog {
                border-width: 25px;       /* Nice thick border on our images */
                border-style: dotted;     /* border will be dotted */
                border-color: #fffba0;    /* Applies #fffba0 color to all four sides */
                /* Note that CSS offers a shorthand for these three properties: 
                border: 25px dotted #fffba0; 
                */ 
            }

            /* What if I want to add some extra styling to one paragraph in particular, like the description of our dog Wilbur? 
            We don't want to have these styles applied to ALL paragraphs. We need to define a CSS ID, using a # then a custom name */ 
            #wilbur-description {
                color: #cccccc; /* Use a hex code to specific a light grey */ 
                margin-left: 10px; /* Add a little space (10 pixels) on the left... */
                border-left-style: solid; /* then a solid border on the left */ 
                padding-left: 10px; /* and finally another 10 pixels of space before the text */
            }

            /* Here we define another CSS class. Let's see what it's for later in the HTML! */ 
            .m-and-m {
                color: brown;
                text-decoration: underline;
            }

            /* Note that we can validate our CSS with https://jigsaw.w3.org/css-validator */
        </style><!-- We're done with our CSS! Back to HTML -->

    <!-- close HTML head -->
    </head> 
    <!-- start HTML body -->
    <body>
        <h1>Very good dogs</h1>

        <!-- Let's insert an image!  
        1. We need to tell the browser where to look. In this case, our image is in a folder called images and its called puppy.jpg, so we set src = "./images/puppy.jpg" 
        (Note that these paths are Case Sensitive, and you have to get the file extension exactly right)
        2. Since this is a photo of a dog, we'll tell the browser to add the styling we added to the "dog" class above.
        3. And lastly we'll add some alt text for screen readers and other adaptive devices -->  
        <img src="./images/puppy.jpg" class="dog" alt="photo of a young dog walking toward the camera">

        <!-- Inside this h2, we'll do 3 interesting things. First, we'll use HTML5's <em> tag, which stands for emphasis and is, by default, style as italics. Then we'll use <strong> to boldly assert Wilbur's innocence. And lastly we'll use a new tag called <span> with the CSS class "m-and-m" we defined in the <head> <style> tag. 
        -->
        <h2>
            This is Wilbur, and he <em>definitely</em> did <strong>not</strong> eat those <span class="m-and-m">M&Ms</span>
            <!-- 
            "Inline" CSS would look like this: 
                <span style="color: brown; text-decoration: underline;">M&Ms</span>
            But it's generally a bad practice because you have CSS in the HTML body, not all in one place. 
            -->
        </h2>
        <!-- For this next paragraph, we'll use the CSS ID "wilbur-description" to apply thsoe extra styles we wrote above in the <head> <style> tag 
        --> 
        <p id="wilbur-description">
            Wilbur is a star and a very good boy. His favorite season is fall.
        </p>
        <!-- We can then compare how Wilbur's description is styled vs. a normal paragraph -->
        <p>
            Here's a normal paragraph.
        <p>
            <!-- Here's a basic link, using the a for anchor tag. Here we can see the effects of our changes to a tags. -->
            <a href="https://www.pratt.edu/">Visit Pratt homepage</a>
        </p>
    <!-- end body tag -->
    </body>
</html>
